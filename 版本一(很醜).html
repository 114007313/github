<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《放鳥同盟》FlakeOut App —— 大家做社交，我偏反社交</title>
    <meta name="description" content="專為現代人設計的放鳥藉口產生器！結合天氣與時間，運用在地隨機庫或強大的 AI 模型，一鍵生成超荒謬但莫名合理的完美藉口，幫您省下滿滿的社交能量。">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景發光粒子特效容器 -->
    <div class="glowing-orbs-container" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- 頂部導覽與 API 設定 -->
        <header class="app-header">
            <div class="logo-area">
                <span class="logo-icon" role="img" aria-label="flakeout">🪶</span>
                <div class="logo-text">
                    <h1>《放鳥同盟》</h1>
                    <span class="sub-logo">FlakeOut App</span>
                </div>
            </div>
            
            <div class="api-key-config" id="api-config-panel">
                <div class="api-input-wrapper">
                    <label for="api-key-input" class="sr-only">Anthropic API Key</label>
                    <input type="password" id="api-key-input" placeholder="輸入 Anthropic API Key (選填)" autocomplete="off">
                    <button type="button" id="toggle-api-visibility" class="btn-icon" title="顯示/隱藏金鑰">👁️</button>
                </div>
                <div class="api-status" id="api-status-text">
                    <span class="status-dot warning"></span> 備用本地模式
                </div>
            </div>
        </header>

        <!-- 主要互動區域 -->
        <main class="app-content">
            <!-- 介紹語 -->
            <section class="intro-section">
                <p class="tagline">—— 大家忙著社交，我偏要優雅躺平 ——</p>
                <p class="description">今天又不想出門？選擇你的目標對象、目前天氣與時間，讓我們的「藉口生成引擎」為您規劃完美的缺席理由。</p>
            </section>

            <!-- 設定表單 -->
            <form id="flake-form" onsubmit="return false;">
                
                <!-- 1. 放鳥對象 -->
                <div class="form-group">
                    <h2 class="section-title"><span class="step-num">1</span> 今天要放鳥誰？</h2>
                    <div class="card-selector-group">
                        <label class="card-option" for="target-boss">
                            <input type="radio" id="target-boss" name="target" value="老闆" checked>
                            <span class="card-content">
                                <span class="option-icon">💼</span>
                                <span class="option-label">主管 / 老闆</span>
                                <span class="option-desc">高風險、高回報</span>
                            </span>
                        </label>
                        
                        <label class="card-option" for="target-friend">
                            <input type="radio" id="target-friend" name="target" value="朋友">
                            <span class="card-content">
                                <span class="option-icon">🍻</span>
                                <span class="option-label">死黨 / 朋友</span>
                                <span class="option-desc">情感交流（傷害）</span>
                            </span>
                        </label>

                        <label class="card-option" for="target-partner">
                            <input type="radio" id="target-partner" name="target" value="曖昧對象 / 另一半">
                            <span class="card-content">
                                <span class="option-icon">💖</span>
                                <span class="option-label">曖昧 / 另一半</span>
                                <span class="option-desc">求生慾大考驗</span>
                            </span>
                        </label>
                    </div>
                </div>

                <!-- 2. 天氣 & 時間 (並排) -->
                <div class="grid-2-cols">
                    <!-- 天氣選擇 -->
                    <div class="form-group">
                        <h2 class="section-title"><span class="step-num">2</span> 外面的天氣如何？</h2>
                        <div class="segment-selector">
                            <label class="segment-option" for="weather-rain">
                                <input type="radio" id="weather-rain" name="weather" value="下大雨" checked>
                                <span class="segment-content">🌧️ 下大雨</span>
                            </label>
                            <label class="segment-option" for="weather-sun">
                                <input type="radio" id="weather-sun" name="weather" value="大太陽">
                                <span class="segment-content">☀️ 大太陽</span>
                            </label>
                            <label class="segment-option" for="weather-cloudy">
                                <input type="radio" id="weather-cloudy" name="weather" value="陰天">
                                <span class="segment-content">☁️ 陰天</span>
                            </label>
                        </div>
                    </div>

                    <!-- 時間選擇 -->
                    <div class="form-group">
                        <h2 class="section-title"><span class="step-num">3</span> 聚會的時間點？</h2>
                        <div class="segment-selector">
                            <label class="segment-option" for="time-morning">
                                <input type="radio" id="time-morning" name="time" value="早上" checked>
                                <span class="segment-content">🌅 早上</span>
                            </label>
                            <label class="segment-option" for="time-afternoon">
                                <input type="radio" id="time-afternoon" name="time" value="下午">
                                <span class="segment-content">☕ 下午</span>
                            </label>
                            <label class="segment-option" for="time-night">
                                <input type="radio" id="time-night" name="time" value="晚上">
                                <span class="segment-content">🌃 晚上</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 生成按鈕 -->
                <div class="action-wrapper">
                    <button type="button" id="btn-generate" class="btn-primary">
                        <span class="btn-glow"></span>
                        <span class="btn-text">🚀 啟動 AI 藉口生成引擎</span>
                    </button>
                </div>
            </form>

            <!-- 結果展示區 -->
            <section class="result-section hidden" id="result-area">
                <div class="result-card">
                    <div class="card-header">
                        <span class="card-tag">✨ 完美放鳥藉口已生成</span>
                        <button type="button" id="btn-copy" class="btn-secondary">
                            <span class="btn-icon-copy">📋</span> 複製藉口
                        </button>
                    </div>
                    
                    <div class="excuse-body">
                        <p id="excuse-text" class="typing-text">正在讀取宇宙磁場...</p>
                    </div>

                    <!-- 社交能量條 -->
                    <div class="energy-dashboard">
                        <div class="energy-info">
                            <span class="energy-label">🔋 本次省下社交能量</span>
                            <span class="energy-value" id="energy-pts">+0 點</span>
                        </div>
                        <div class="energy-bar-container">
                            <div class="energy-bar" id="energy-progress"></div>
                        </div>
                        <p class="energy-tip" id="energy-tip-text">充電中，準備啟動節能模式...</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>《放鳥同盟》FlakeOut App 版權所有 © 2026</p>
            <p class="disclaimer">⚠️ 免責聲明：本產品純屬社交紓壓娛樂，若因過度放鳥導致失業、失戀或社交圈蒸發，本同盟概不負責。</p>
        </footer>
    </div>

    <!-- JavaScript Source -->
    <script src="app.js"></script>
</body>
</html>
